<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('gemma-desktop-theme') ?? 'system'
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const effectiveTheme =
            storedTheme === 'dark' || (storedTheme === 'system' && prefersDark)
              ? 'dark'
              : 'light'

          if (effectiveTheme === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch {
          // Ignore theme bootstrapping failures and fall back to the default render.
        }
      })()
    </script>
  </head>
  <body class="h-full overflow-hidden bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
